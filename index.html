<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGHT Sales Workspace</title>
<style>
:root {
  color-scheme: light;
  --c0:#f1f5f9; --c1:#e2e8f0; --c2:#94a3b8; --c3:#475569; --c4:#1e293b;
  --leads:#2563eb; --leads-l:#dbeafe; --leads-d:#1d4ed8;
  --pitch:#d97706; --pitch-l:#fef3c7; --pitch-d:#b45309;
  --nego:#ea580c;  --nego-l:#ffedd5;  --nego-d:#c2410c;
  --closed:#16a34a;--closed-l:#dcfce7;--closed-d:#15803d;
  --rad:10px; --shadow:0 1px 4px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:var(--c4);min-height:100vh;direction:rtl}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px}
.hdr-title{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;color:#94a3b8;margin-top:1px}
.hdr-stats{display:flex;gap:12px}
.stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 12px;text-align:center}
.stat .n{font-size:16px;font-weight:700;color:#38bdf8}
.stat .l{font-size:10px;color:#94a3b8}

/* ── TOOLBAR ── */
.tbar{background:#fff;border-bottom:1px solid var(--c1);padding:9px 20px;display:flex;align-items:center;gap:8px}
.btn{padding:6px 13px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--c1);background:#fff;color:var(--c4);transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#f1f5f9;border-color:#94a3b8}
.btn.prim{background:#2563eb;color:#fff;border-color:#2563eb}
.btn.prim:hover{background:#1d4ed8}
.btn.danger{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.btn.danger:hover{background:#fca5a5}
.btn.success{background:#dcfce7;color:#15803d;border-color:#86efac}
.tbar-right{margin-right:auto;display:flex;align-items:center;gap:8px}
.search{display:flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid var(--c1);border-radius:7px;padding:5px 11px;font-size:13px;color:var(--c2)}
.search input{border:none;background:transparent;outline:none;font-size:13px;color:var(--c4);width:160px;font-family:inherit}

/* ── BOARD ── */
.board{display:flex;gap:14px;padding:16px 20px;overflow-x:auto;align-items:flex-start;min-height:calc(100vh - 130px)}
.col{flex:0 0 280px;display:flex;flex-direction:column;border-radius:12px;background:var(--c0);border:1px solid var(--c1)}
.col-hdr{padding:12px 14px;border-radius:12px 12px 0 0;color:#fff;display:flex;align-items:center;justify-content:space-between}
.col-hdr-l{display:flex;align-items:center;gap:7px}
.col-hdr .title{font-size:14px;font-weight:700}
.col-hdr .sub{font-size:10px;opacity:.8}
.col-count{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:120px;transition:.2s}
.col-body.drag-over{background:#e0f2fe;border-radius:0 0 12px 12px}

/* ── CARDS ── */
.card{background:#fff;border-radius:9px;box-shadow:var(--shadow);padding:12px;cursor:grab;border:2px solid transparent;position:relative;overflow:hidden;transition:.15s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.13);transform:translateY(-1px)}
.card.dragging{opacity:.45;cursor:grabbing;transform:rotate(2deg)}
.card::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px}
.col-leads .card::after{background:var(--leads)}
.col-pitch .card::after{background:var(--pitch)}
.col-nego  .card::after{background:var(--nego)}
.col-closed.card::after{background:var(--closed)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:6px}
.card-name{font-size:13px;font-weight:700;line-height:1.4;flex:1}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.badge.high{background:#fee2e2;color:#dc2626}
.badge.med {background:#fef3c7;color:#b45309}
.badge.low {background:#dcfce7;color:#15803d}
.badge.won {background:#dcfce7;color:#15803d}
.card-co{font-size:11px;color:var(--c2);margin-bottom:6px}
.card-val{font-size:14px;font-weight:700;margin-bottom:6px}
.card-val span{font-size:11px;font-weight:400;color:var(--c2)}
.card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:7px;border-top:1px solid #f1f5f9;margin-top:4px}
.card-meta{font-size:11px;color:var(--c2);display:flex;gap:8px}
.card-actions{display:flex;gap:4px;opacity:0;transition:.15s}
.card:hover .card-actions{opacity:1}
.icon-btn{width:24px;height:24px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s}
.icon-btn.edit{background:#e0f2fe;color:#0284c7}
.icon-btn.edit:hover{background:#bae6fd}
.icon-btn.del{background:#fee2e2;color:#dc2626}
.icon-btn.del:hover{background:#fca5a5}
.icon-btn.move{background:#f0fdf4;color:#15803d;font-size:11px;width:auto;padding:0 6px}
.icon-btn.move:hover{background:#bbf7d0}
.prog{height:3px;background:var(--c1);border-radius:2px;margin-top:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.add-btn{margin:0 10px 10px;padding:8px;border:2px dashed var(--c1);border-radius:8px;background:transparent;cursor:pointer;font-size:12px;color:var(--c2);transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.add-btn:hover{border-color:#93c5fd;color:var(--leads);background:rgba(37,99,235,.04)}

/* ── STAGE COLORS ── */
.leads-bg{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.pitch-bg {background:linear-gradient(135deg,#b45309,#f59e0b)}
.nego-bg  {background:linear-gradient(135deg,#c2410c,#f97316)}
.closed-bg{background:linear-gradient(135deg,#15803d,#22c55e)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:540px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--c1);display:flex;justify-content:space-between;align-items:center}
.modal-hdr h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--c2);border-radius:6px;padding:2px 6px}
.modal-close:hover{background:#f1f5f9}
.modal-body{padding:18px 20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--c2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--c1);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--c4);font-family:inherit;outline:none;transition:.15s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--c1)}

/* detail modal */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.detail-item label{font-size:10px;font-weight:600;color:var(--c2);text-transform:uppercase;display:block;margin-bottom:3px}
.detail-item .v{font-size:13px;font-weight:600}
.sec-title{font-size:12px;font-weight:700;color:var(--c4);border-bottom:1px solid var(--c1);padding-bottom:5px;margin-bottom:10px}
.tasks-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.task-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;cursor:pointer;padding:4px;border-radius:5px;transition:.1s}
.task-item:hover{background:#f8fafc}
.task-item.done{color:var(--c2);text-decoration:line-through}
.task-cb{width:17px;height:17px;border:2px solid var(--c1);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s;margin-top:1px}
.task-item.done .task-cb{background:#16a34a;border-color:#16a34a;color:#fff}
.notes-box{background:#f8fafc;border-radius:7px;padding:10px;font-size:13px;line-height:1.6;margin-bottom:14px}
.move-btns{display:flex;gap:6px;flex-wrap:wrap}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ── CONFIRM ── */
.confirm-box{background:#fff;border-radius:12px;padding:24px;width:320px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--c2);margin-bottom:18px}
.confirm-btns{display:flex;gap:8px;justify-content:center}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">S</div>
    <div>
      <div class="hdr-title">SIGHT Sales Workspace</div>
      <div class="hdr-sub">لوحة المبيعات التفاعلية — اسحب وأفلت وعدّل بحرية</div>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="stat"><div class="n" id="stat-total">22</div><div class="l">إجمالي</div></div>
    <div class="stat"><div class="n" id="stat-val" style="color:#34d399">0M</div><div class="l">القيمة (ر.س)</div></div>
    <div class="stat"><div class="n" id="stat-closed" style="color:#86efac">5</div><div class="l">مُغلقة</div></div>
  </div>
</div>

<div class="tbar">
  <button class="btn prim" onclick="openAddCard()">＋ صفقة جديدة</button>
  <div class="tbar-right">
    <div class="search">🔍 <input id="searchInput" placeholder="بحث..." oninput="doSearch()"></div>
  </div>
</div>

<div class="board" id="board"></div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="formOverlay" onclick="closeIfBg(event,'formOverlay')">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="formTitle">إضافة صفقة جديدة</h2>
      <button class="modal-close" onclick="closeForm()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>اسم الصفقة / المشروع</label>
          <input id="f-name" placeholder="مثال: نظام ERP لشركة X">
        </div>
        <div class="form-group">
          <label>اسم الشركة</label>
          <input id="f-company" placeholder="مثال: شركة النور">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>اسم المسؤول / جهة الاتصال</label>
          <input id="f-contact" placeholder="مثال: أحمد الغامدي">
        </div>
        <div class="form-group">
          <label>القيمة (ريال سعودي)</label>
          <input id="f-value" type="number" placeholder="مثال: 250000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>المرحلة</label>
          <select id="f-stage">
            <option value="leads">🔵 عملاء محتملون</option>
            <option value="pitch">🟡 عروض تقديمية</option>
            <option value="nego">🟠 تفاوضات</option>
            <option value="closed">🟢 عقود مُغلقة</option>
          </select>
        </div>
        <div class="form-group">
          <label>الأولوية</label>
          <select id="f-priority">
            <option value="high">🔴 عاجل</option>
            <option value="med">🟡 متوسط</option>
            <option value="low">🟢 منخفض</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>الموعد النهائي</label>
          <input id="f-deadline" type="date">
        </div>
        <div class="form-group">
          <label>التذكير</label>
          <select id="f-reminder">
            <option value="daily">🔔 يومي</option>
            <option value="weekly">📆 أسبوعي</option>
            <option value="none">بدون تذكير</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>ملاحظات</label>
        <textarea id="f-notes" placeholder="أضف تفاصيل وملاحظات عن الصفقة..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeForm()">إلغاء</button>
        <button class="btn prim" onclick="saveCard()">💾 حفظ الصفقة</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="closeIfBg(event,'detailOverlay')">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="detailTitle">تفاصيل الصفقة</h2>
      <button class="modal-close" onclick="document.getElementById('detailOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>⚠️ حذف الصفقة</h3>
    <p id="confirmMsg">هل أنت متأكد من حذف هذه الصفقة؟</p>
    <div class="confirm-btns">
      <button class="btn" onclick="document.getElementById('confirmOverlay').classList.remove('open')">إلغاء</button>
      <button class="btn danger" id="confirmOk">حذف</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let editingId = null;
let dragId = null;

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(filter=''){
  const board = document.getElementById('board');
  board.innerHTML = '';

  STAGES.forEach(stage => {
    const stageDeals = deals.filter(d => d.stage === stage.id && (!filter || d.name.includes(filter) || d.company.includes(filter) || d.contact.includes(filter)));

    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `
      <div class="col-hdr ${stage.cls}">
        <div class="col-hdr-l">
          <div>
            <div class="title">${stage.label}</div>
            <div class="sub">${stage.sub}</div>
          </div>
        </div>
        <div class="col-count">${stageDeals.length}</div>
      </div>
      <div class="col-body" id="col-${stage.id}"
        ondragover="onDragOver(event,'${stage.id}')"
        ondragleave="onDragLeave(event,'${stage.id}')"
        ondrop="onDrop(event,'${stage.id}')">
      </div>
      <button class="add-btn" onclick="openAddCard('${stage.id}')">＋ إضافة صفقة</button>
    `;

    board.appendChild(col);
    const body = col.querySelector(`#col-${stage.id}`);

    stageDeals.forEach(d => {
      const card = document.createElement('div');
      card.className = 'card';
      card.draggable = true;
      card.dataset.id = d.id;

      const priMap = {high:'badge high',med:'badge med',low:'badge low',won:'badge won'};
      const priLabel = {high:'عاجل',med:'متوسط',low:'منخفض',won:'مُغلقة ✅'};
      const remLabel = d.reminder === 'daily' ? '🔔 يومي' : d.reminder === 'weekly' ? '📆 أسبوعي' : '';
      const fillColor = stage.color;

      // next stage button
      const stages = ['leads','pitch','nego','closed'];
      const si = stages.indexOf(d.stage);
      const nextStage = si < 3 ? stages[si+1] : null;
      const nextLabel = {leads:'→ Pitch',pitch:'→ تفاوض',nego:'→ مُغلقة'}[d.stage] || '';

      card.innerHTML = `
        <div class="card-top">
          <div class="card-name">${d.name}</div>
          <span class="${priMap[d.priority]}">${priLabel[d.priority]}</span>
        </div>
        <div class="card-co">🏢 ${d.company} — ${d.contact}</div>
        <div class="card-val">${Number(d.value).toLocaleString('ar-SA')} <span>ر.س</span></div>
        <div class="card-foot">
          <div class="card-meta">
            <span>📅 ${d.deadline||'—'}</span>
            ${remLabel ? `<span>${remLabel}</span>` : ''}
          </div>
          <div class="card-actions">
            ${nextStage ? `<button class="icon-btn move" onclick="event.stopPropagation();moveCard(${d.id},'${nextStage}')">${nextLabel}</button>` : ''}
            <button class="icon-btn edit" onclick="event.stopPropagation();openEditCard(${d.id})">✏️</button>
            <button class="icon-btn del" onclick="event.stopPropagation();confirmDelete(${d.id})">🗑</button>
          </div>
        </div>
        <div class="prog"><div class="prog-fill" style="width:${d.progress}%;background:${fillColor}"></div></div>
      `;

      card.addEventListener('click', () => openDetail(d.id));
      card.addEventListener('dragstart', e => { dragId = d.id; setTimeout(()=>card.classList.add('dragging'),0); });
      card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragId = null; });

      body.appendChild(card);
    });
  });

  updateStats();
}

// ══════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════
function onDragOver(e, stageId){
  e.preventDefault();
  document.getElementById('col-'+stageId).classList.add('drag-over');
}
function onDragLeave(e, stageId){
  document.getElementById('col-'+stageId).classList.remove('drag-over');
}
function onDrop(e, stageId){
  e.preventDefault();
  document.getElementById('col-'+stageId).classList.remove('drag-over');
  if(dragId == null) return;
  const deal = deals.find(d=>d.id == dragId);
  if(deal && deal.stage !== stageId){
    deal.stage = stageId;
    render();
    toast(`تم نقل الصفقة إلى ${STAGES.find(s=>s.id===stageId).label} ✓`);
  }
}

// ══════════════════════════════════════════
// MOVE BUTTON
// ══════════════════════════════════════════
function moveCard(id, toStage){
  const deal = deals.find(d=>d.id===id);
  if(!deal) return;
  deal.stage = toStage;
  render();
  toast(`تم نقل الصفقة إلى ${STAGES.find(s=>s.id===toStage).label} ✓`);
}

// ══════════════════════════════════════════
// ADD / EDIT FORM
// ══════════════════════════════════════════
function openAddCard(preStage='leads'){
  editingId = null;
  document.getElementById('formTitle').textContent = 'إضافة صفقة جديدة';
  document.getElementById('f-name').value = '';
  document.getElementById('f-company').value = '';
  document.getElementById('f-contact').value = '';
  document.getElementById('f-value').value = '';
  document.getElementById('f-stage').value = preStage;
  document.getElementById('f-priority').value = 'med';
  document.getElementById('f-deadline').value = '';
  document.getElementById('f-reminder').value = 'daily';
  document.getElementById('f-notes').value = '';
  document.getElementById('formOverlay').classList.add('open');
}

function openEditCard(id){
  const d = deals.find(x=>x.id===id);
  if(!d) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'تعديل الصفقة';
  document.getElementById('f-name').value = d.name;
  document.getElementById('f-company').value = d.company;
  document.getElementById('f-contact').value = d.contact;
  document.getElementById('f-value').value = d.value;
  document.getElementById('f-stage').value = d.stage;
  document.getElementById('f-priority').value = d.priority;
  document.getElementById('f-deadline').value = d.deadline||'';
  document.getElementById('f-reminder').value = d.reminder||'none';
  document.getElementById('f-notes').value = d.notes||'';
  document.getElementById('formOverlay').classList.add('open');
  document.getElementById('detailOverlay').classList.remove('open');
}

function saveCard(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('يرجى إدخال اسم الصفقة'); return; }
  if(editingId){
    const d = deals.find(x=>x.id===editingId);
    d.name = name;
    d.company = document.getElementById('f-company').value.trim() || d.company;
    d.contact = document.getElementById('f-contact').value.trim() || d.contact;
    d.value = Number(document.getElementById('f-value').value) || d.value;
    d.stage = document.getElementById('f-stage').value;
    d.priority = document.getElementById('f-priority').value;
    d.deadline = document.getElementById('f-deadline').value;
    d.reminder = document.getElementById('f-reminder').value;
    d.notes = document.getElementById('f-notes').value;
    toast('تم تحديث الصفقة ✓');
  } else {
    deals.push({
      id: uid(), stage: document.getElementById('f-stage').value,
      name, company: document.getElementById('f-company').value.trim(),
      contact: document.getElementById('f-contact').value.trim(),
      value: Number(document.getElementById('f-value').value)||0,
      priority: document.getElementById('f-priority').value,
      deadline: document.getElementById('f-deadline').value,
      reminder: document.getElementById('f-reminder').value,
      notes: document.getElementById('f-notes').value,
      progress: 10, tasks:[]
    });
    toast('تمت إضافة الصفقة بنجاح ✓');
  }
  closeForm();
  render();
}

function closeForm(){
  document.getElementById('formOverlay').classList.remove('open');
}

// ══════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════
function confirmDelete(id){
  const d = deals.find(x=>x.id===id);
  document.getElementById('confirmMsg').textContent = `هل تريد حذف صفقة "${d.name}"؟`;
  document.getElementById('confirmOk').onclick = () => {
    deals = deals.filter(x=>x.id!==id);
    document.getElementById('confirmOverlay').classList.remove('open');
    document.getElementById('detailOverlay').classList.remove('open');
    render();
    toast('تم حذف الصفقة');
  };
  document.getElementById('confirmOverlay').classList.add('open');
}

// ══════════════════════════════════════════
// DETAIL VIEW
// ══════════════════════════════════════════
function openDetail(id){
  const d = deals.find(x=>x.id===id);
  if(!d) return;
  const stage = STAGES.find(s=>s.id===d.stage);

  const stages = ['leads','pitch','nego','closed'];
  const si = stages.indexOf(d.stage);

  let moveBtnsHTML = '';
  stages.forEach((s,i) => {
    if(s !== d.stage){
      const sl = STAGES.find(x=>x.id===s);
      moveBtnsHTML += `<button class="btn" style="font-size:12px" onclick="moveCard(${d.id},'${s}');document.getElementById('detailOverlay').classList.remove('open')">${sl.label}</button>`;
    }
  });

  const tasksHTML = d.tasks.map((t,i) => `
    <div class="task-item ${t.done?'done':''}" onclick="toggleTask(${d.id},${i})">
      <div class="task-cb">${t.done?'✓':''}</div>
      <span>${t.t}</span>
    </div>`).join('');

  const priLabel = {high:'🔴 عاجل',med:'🟡 متوسط',low:'🟢 منخفض',won:'✅ مُغلقة'};

  document.getElementById('detailTitle').textContent = d.name;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-item"><label>الشركة</label><div class="v">🏢 ${d.company}</div></div>
      <div class="detail-item"><label>جهة الاتصال</label><div class="v">👤 ${d.contact}</div></div>
      <div class="detail-item"><label>القيمة</label><div class="v" style="color:var(--closed);font-size:16px">${Number(d.value).toLocaleString('ar-SA')} ر.س</div></div>
      <div class="detail-item"><label>الأولوية</label><div class="v">${priLabel[d.priority]||d.priority}</div></div>
      <div class="detail-item"><label>المرحلة الحالية</label><div class="v" style="color:${stage.color}">${stage.label}</div></div>
      <div class="detail-item"><label>الموعد النهائي</label><div class="v">📅 ${d.deadline||'—'}</div></div>
    </div>

    <div class="sec-title">📋 المهام (${d.tasks.filter(t=>t.done).length}/${d.tasks.length})</div>
    <div class="tasks-list" id="tasks-${d.id}">${tasksHTML || '<div style="color:var(--c2);font-size:13px">لا توجد مهام بعد</div>'}</div>

    ${d.notes ? `<div class="sec-title">📝 ملاحظات</div><div class="notes-box">${d.notes}</div>` : ''}

    <div class="sec-title">🔀 نقل الصفقة إلى مرحلة أخرى</div>
    <div class="move-btns" style="margin-bottom:16px">${moveBtnsHTML}</div>

    <div style="display:flex;gap:8px">
      <button class="btn prim" onclick="openEditCard(${d.id})" style="flex:1">✏️ تعديل الصفقة</button>
      <button class="btn danger" onclick="confirmDelete(${d.id})">🗑 حذف</button>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function toggleTask(dealId, taskIdx){
  const d = deals.find(x=>x.id===dealId);
  if(!d || !d.tasks[taskIdx]) return;
  d.tasks[taskIdx].done = !d.tasks[taskIdx].done;
  // update progress
  d.progress = d.tasks.length ? Math.round(d.tasks.filter(t=>t.done).length/d.tasks.length*100) : d.progress;
  openDetail(dealId);
  render(document.getElementById('searchInput').value);
}

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
function doSearch(){
  render(document.getElementById('searchInput').value.trim());
}

// ══════════════════════════════════════════
// STATS
// ══════════════════════════════════════════
function updateStats(){
  document.getElementById('stat-total').textContent = deals.length;
  const total = deals.reduce((s,d)=>s+d.value,0);
  document.getElementById('stat-val').textContent = (total/1000000).toFixed(1)+'M';
  document.getElementById('stat-closed').textContent = deals.filter(d=>d.stage==='closed').length;
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function closeIfBg(e, id){
  if(e.target === document.getElementById(id))
    document.getElementById(id).classList.remove('open');
}

let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

// ── INIT ──
render();
</script>
